name: Deploy Frontend to VPS

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: desusreecharan/uniz-portal:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_MAINTENANCE_MODE=${{ secrets.VITE_MAINTENANCE_MODE }}
            VITE_CLOUDINARY_CLOUD_NAME=${{ secrets.VITE_CLOUDINARY_CLOUD_NAME }}
            VITE_CLOUDINARY_UPLOAD_PRESET=${{ secrets.VITE_CLOUDINARY_UPLOAD_PRESET }}
            VITE_SCRAPER_URL=${{ secrets.VITE_SCRAPER_URL }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Deploy to Kubernetes
            kubectl set image deployment/uniz-portal uniz-portal=desusreecharan/uniz-portal:latest
            kubectl rollout restart deployment/uniz-portal
