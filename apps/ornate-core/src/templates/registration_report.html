<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Report</title>
    <style>
      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        color: #1a1a1a;
        margin: 0;
        padding: 40px;
        background-color: #fff;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 40px;
        border-bottom: 2px solid #f3f4f6;
        padding-bottom: 20px;
      }
      .logo {
        font-size: 24px;
        font-weight: 800;
        color: #1a1a1a;
        letter-spacing: -0.5px;
      }
      .report-title {
        text-align: right;
      }
      h1 {
        margin: 0;
        font-size: 20px;
        color: #1a1a1a;
      }
      p.date {
        margin: 5px 0 0;
        font-size: 12px;
        color: #6b7280;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }
      th {
        background-color: #f9fafb;
        color: #6b7280;
        font-size: 10px;
        text-transform: uppercase;
        font-weight: 600;
        text-align: left;
        padding: 12px 15px;
        border-bottom: 1px solid #e5e7eb;
      }
      td {
        padding: 12px 15px;
        font-size: 12px;
        border-bottom: 1px solid #f3f4f6;
        color: #4b5563;
      }
      tr:nth-child(even) {
        background-color: #fafafa;
      }
      .status {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 9999px;
        font-size: 10px;
        font-weight: 600;
        text-transform: capitalize;
      }
      .status-confirmed {
        background-color: #d1fae5;
        color: #065f46;
      }
      .status-pending {
        background-color: #fef3c7;
        color: #92400e;
      }
      .status-waitlisted {
        background-color: #e0e7ff;
        color: #3730a3;
      }
      .footer {
        margin-top: 40px;
        font-size: 10px;
        color: #9ca3af;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div className="header">
      <div className="logo text-4xl font-bold">Ornate Core</div>
      <div className="report-title">
        <h1>Registrations Export</h1>
        <p className="date">Generated on {{generated_date}}</p>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Student Name</th>
          <th>Roll Number</th>
          <th>Event</th>
          <th>Status</th>
          <th>Payment</th>
        </tr>
      </thead>
      <tbody>
        {{rows}}
      </tbody>
    </table>

    <div className="footer">
      &copy; 2026 Ornate Event Management System. This is a computer-generated
      report.
    </div>
  </body>
</html>
