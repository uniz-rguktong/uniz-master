<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Report</title>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #1A1A1A;
            margin: 0;
            padding: 40px;
            background-color: #fff;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #F3F4F6;
            padding-bottom: 20px;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #1A1A1A;
            letter-spacing: -0.5px;
        }
        .report-title {
            text-align: right;
        }
        h1 {
            margin: 0;
            font-size: 20px;
            color: #1A1A1A;
        }
        p.date {
            margin: 5px 0 0;
            font-size: 12px;
            color: #6B7280;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th {
            background-color: #F9FAFB;
            color: #6B7280;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 600;
            text-align: left;
            padding: 12px 15px;
            border-bottom: 1px solid #E5E7EB;
        }
        td {
            padding: 12px 15px;
            font-size: 12px;
            border-bottom: 1px solid #F3F4F6;
            color: #4B5563;
        }
        tr:nth-child(even) {
            background-color: #FAFAFA;
        }
        .status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 9999px;
            font-size: 10px;
            font-weight: 600;
            text-transform: capitalize;
        }
        .status-confirmed { background-color: #D1FAE5; color: #065F46; }
        .status-pending { background-color: #FEF3C7; color: #92400E; }
        .status-waitlisted { background-color: #E0E7FF; color: #3730A3; }
        .footer {
            margin-top: 40px;
            font-size: 10px;
            color: #9CA3AF;
            text-align: center;
        }
    </style>
</head>
<body>
    <div className="header">
        <div className="logo text-4xl font-bold">Ornate-EMS</div>
        <div className="report-title">
            <h1>Registrations Export</h1>
            <p className="date">Generated on {{generated_date}}</p>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Student Name</th>
                <th>Roll Number</th>
                <th>Event</th>
                <th>Status</th>
                <th>Payment</th>
            </tr>
        </thead>
        <tbody>
            {{rows}}
        </tbody>
    </table>

    <div className="footer">
        &copy; 2026 Ornate Event Management System. This is a computer-generated report.
    </div>
</body>
</html>
