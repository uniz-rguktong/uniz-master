name: Deploy Infrastructure to VPS

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy configurations via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx/nginx.conf,kubernetes/**,scripts/**"
          target: "~/uniz-infrastructure/"

      - name: Reload Services via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/uniz-infrastructure
            # Pull latest images just in case
            docker compose -f docker-compose.prod.yml pull
            # Update containers
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            # Restart gateway to apply Nginx changes if any
            docker compose -f docker-compose.prod.yml restart uniz-gateway
