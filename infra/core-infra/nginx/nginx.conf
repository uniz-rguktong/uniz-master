events {
    worker_connections 10000;
}

http {
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;

        # Dynamic CORS based on Origin header
        set $cors_origin "";
        if ($http_origin ~* (https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$)) {
            set $cors_origin $http_origin;
        }

        set $cors_methods "GET,OPTIONS,PATCH,DELETE,POST,PUT";
        set $cors_headers "X-CSRF-Token, X-Requested-With, Accept, Accept-Version, Content-Length, Content-MD5, Content-Type, Date, X-Api-Version, Authorization";

        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' $cors_methods always;
        add_header 'Access-Control-Allow-Headers' $cors_headers always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        proxy_hide_header 'Access-Control-Allow-Credentials';

        # Internal Gateway Status
        location /gateway-status {
            set $upstream_gateway_api uniz-gateway-api:3000;
            proxy_pass http://$upstream_gateway_api/gateway-status;
        }

        # v1 API Routes
        location /api/v1/ {
            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Methods';
            proxy_hide_header 'Access-Control-Allow-Headers';
            proxy_hide_header 'Access-Control-Allow-Credentials';

            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' $cors_methods always;
            add_header 'Access-Control-Allow-Headers' $cors_headers always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' $cors_methods always;
                add_header 'Access-Control-Allow-Headers' $cors_headers always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                return 204;
            }

            # Proxy Pass logic for sub-paths
            if ($uri ~* ^/api/v1/system/health) {
                set $upstream_gateway_api uniz-gateway-api:3000;
                proxy_pass http://$upstream_gateway_api;
            }
            if ($uri ~* ^/api/v1/auth/(.*)) {
                set $upstream_auth uniz-auth-service:3001;
                rewrite ^/api/v1/auth/(.*) /$1 break;
                proxy_pass http://$upstream_auth;
            }
            if ($uri ~* ^/api/v1/profile/(.*)) {
                set $upstream_user uniz-user-service:3002;
                rewrite ^/api/v1/profile/(.*) /$1 break;
                proxy_pass http://$upstream_user;
            }
            if ($uri ~* ^/api/v1/cms/(.*)) {
                set $upstream_user uniz-user-service:3002;
                rewrite ^/api/v1/cms/(.*) /$1 break;
                proxy_pass http://$upstream_user;
            }
            if ($uri ~* ^/api/v1/grievance/(.*)) {
                set $upstream_outpass uniz-outpass-service:3003;
                rewrite ^/api/v1/grievance/(.*) /grievance/$1 break;
                proxy_pass http://$upstream_outpass;
            }
            if ($uri ~* ^/api/v1/requests/(.*)) {
                set $upstream_outpass uniz-outpass-service:3003;
                rewrite ^/api/v1/requests/(.*) /$1 break;
                proxy_pass http://$upstream_outpass;
            }
            if ($uri ~* ^/api/v1/cron/(.*)) {
                set $upstream_cron uniz-cron-service:3008;
                rewrite ^/api/v1/cron/(.*) /$1 break;
                proxy_pass http://$upstream_cron;
            }
            if ($uri ~* ^/api/v1/notifications/(.*)) {
                set $upstream_notifications uniz-notification-service:3007;
                rewrite ^/api/v1/notifications/(.*) /$1 break;
                proxy_pass http://$upstream_notifications;
            }
            if ($uri ~* ^/api/v1/mail/(.*)) {
                set $upstream_mail uniz-mail-service:3006;
                rewrite ^/api/v1/mail/(.*) /$1 break;
                proxy_pass http://$upstream_mail;
            }
            if ($uri ~* ^/api/v1/academics/(.*)) {
                set $upstream_academics uniz-academics-service:3004;
                rewrite ^/api/v1/academics/(.*) /$1 break;
                proxy_pass http://$upstream_academics;
            }
            if ($uri ~* ^/api/v1/files/(.*)) {
                set $upstream_files uniz-files-service:3005;
                rewrite ^/api/v1/files/(.*) /$1 break;
                proxy_pass http://$upstream_files;
            }
        }

        location ~ ^/(health|status)$ {
            set $upstream_gateway_api uniz-gateway-api:3000;
            proxy_pass http://$upstream_gateway_api/health;
        }

        # Root fallback - Now pointing to Gateway API for ASCII Art
        location / {
            set $upstream_gateway_api uniz-gateway-api:3000;
            proxy_pass http://$upstream_gateway_api;
        }
    }
}
