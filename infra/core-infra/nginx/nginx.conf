events {
    worker_connections 10000;
}

http {
    resolver 127.0.0.11 valid=30s;
    client_max_body_size 50M;
    proxy_request_buffering off;
    proxy_http_version 1.1;



    upstream auth_service {
        server uniz-auth-service:3001;
        keepalive 32;
    }
    upstream user_service {
        server uniz-user-service:3002;
        keepalive 32;
    }
    upstream outpass_service {
        server uniz-outpass-service:3003;
        keepalive 32;
    }
    upstream academics_service {
        server uniz-academics-service:3004;
        keepalive 32;
    }
    upstream files_service {
        server uniz-files-service:3005;
        keepalive 32;
    }
    upstream mail_service {
        server uniz-mail-service:3006;
        keepalive 32;
    }
    upstream notification_service {
        server uniz-notification-service:3007;
        keepalive 32;
    }
    upstream cron_service {
        server uniz-cron-service:3008;
        keepalive 32;
    }
    upstream gateway_api {
        server uniz-gateway-api:3000;
        keepalive 32;
    }

    server {
        listen 80;

        # Dynamic CORS based on Origin header
        set $cors_origin "";
        if ($http_origin ~* (https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$)) {
            set $cors_origin $http_origin;
        }

        set $cors_methods "GET,OPTIONS,PATCH,DELETE,POST,PUT";
        set $cors_headers "X-CSRF-Token, X-Requested-With, Accept, Accept-Version, Content-Length, Content-MD5, Content-Type, Date, X-Api-Version, Authorization";

        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' $cors_methods always;
        add_header 'Access-Control-Allow-Headers' $cors_headers always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Internal Gateway Status
        location /gateway-status {
            proxy_pass http://gateway_api/gateway-status;
        }

    # v1 API Routes
        location /api/v1/ {
            # Single source of truth for CORS
            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Credentials';
            proxy_hide_header 'Access-Control-Allow-Methods';
            proxy_hide_header 'Access-Control-Allow-Headers';

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' $cors_methods always;
                add_header 'Access-Control-Allow-Headers' $cors_headers always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Content-Length' 0;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                return 204;
            }

            location /api/v1/system/health {
                proxy_pass http://gateway_api;
            }

            location /api/v1/auth/ {
                rewrite ^/api/v1/auth/(.*) /$1 break;
                proxy_pass http://auth_service;
            }

            location /api/v1/profile/ {
                rewrite ^/api/v1/profile/(.*) /$1 break;
                proxy_pass http://user_service;
            }

            location /api/v1/cms/ {
                rewrite ^/api/v1/cms/(.*) /$1 break;
                proxy_pass http://user_service;
            }

            location /api/v1/grievance/ {
                rewrite ^/api/v1/grievance/(.*) /grievance/$1 break;
                proxy_pass http://outpass_service;
            }

            location /api/v1/requests/ {
                rewrite ^/api/v1/requests/(.*) /$1 break;
                proxy_pass http://outpass_service;
            }

            location /api/v1/cron/ {
                rewrite ^/api/v1/cron/(.*) /$1 break;
                proxy_pass http://cron_service;
            }

            location /api/v1/notifications/ {
                rewrite ^/api/v1/notifications/(.*) /$1 break;
                proxy_pass http://notification_service;
            }

            location /api/v1/mail/ {
                rewrite ^/api/v1/mail/(.*) /$1 break;
                proxy_pass http://mail_service;
            }

            location /api/v1/academics/ {
                rewrite ^/api/v1/academics/(.*) /$1 break;
                proxy_pass http://academics_service;
            }

            location /api/v1/files/ {
                rewrite ^/api/v1/files/(.*) /$1 break;
                proxy_pass http://files_service;
            }
        }

        location = /health {
            proxy_pass http://gateway_api/health;
        }

        location = /status {
            proxy_pass http://gateway_api/health;
        }

        location / {
            proxy_pass http://gateway_api;
        }
    }

}
# Triggering GHCR Build - 2026-02-20
