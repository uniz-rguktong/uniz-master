apiVersion: v1
kind: ConfigMap
metadata:
  name: uniz-config
data:
  NODE_ENV: "production"
  DOCKER_ENV: "true"
  INTERNAL_SECRET: "uniz-core"
  GATEWAY_URL: "https://api.uniz.rguktong.in/api/v1"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "465"
  SMTP_SECURE: "true"
  CLOUDINARY_CLOUD_NAME: "dy2fjgt46"
  CLOUDINARY_UPLOAD_PRESET: "uniz_upload"
  # Service Mappings (K8s internal DNS)
  AUTH_SERVICE_URL: "http://uniz-auth-service:3001"
  USER_SERVICE_URL: "http://uniz-user-service:3002"
  ACADEMICS_SERVICE_URL: "http://uniz-academics-service:3004"
  OUTPASS_SERVICE_URL: "http://uniz-outpass-service:3003"
  FILES_SERVICE_URL: "http://uniz-files-service:3005"
  MAIL_SERVICE_URL: "http://uniz-mail-service:3006"
  NOTIFICATION_SERVICE_URL: "http://uniz-notification-service:3007"
  CRON_SERVICE_URL: "http://uniz-cron-service:3008"
  CLIENT_URL: "https://uniz.rguktong.in,http://localhost:3000"
  # DB Connectivity (assuming pgbouncer service in k8s)
  REDIS_URL: "redis://uniz-redis:6379"
