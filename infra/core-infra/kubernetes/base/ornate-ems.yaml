apiVersion: apps/v1
kind: Deployment
metadata:
  name: ornate-ems
  labels:
    app: ornate-ems
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ornate-ems
  template:
    metadata:
      labels:
        app: ornate-ems
    spec:
      containers:
        - name: ornate-ems
          image: ornate-ems:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: ornate-ems-config
            - secretRef:
                name: ornate-ems-secrets
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "200m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: ornate-ems
spec:
  selector:
    app: ornate-ems
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
