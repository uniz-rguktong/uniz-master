apiVersion: apps/v1
kind: Deployment
metadata:
  name: uniz-gateway
  labels:
    app: uniz-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uniz-gateway
  template:
    metadata:
      labels:
        app: uniz-gateway
    spec:
      containers:
        - name: gateway-nginx
          image: uniz-gateway:local
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: nginx-conf
          configMap:
            name: gateway-nginx-conf
---
apiVersion: v1
kind: Service
metadata:
  name: uniz-gateway
spec:
  selector:
    app: uniz-gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: uniz-gateway-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: uniz-gateway
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
