apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-nginx-conf
data:
  nginx.conf: |
    user  nginx;
    worker_processes  auto;

    error_log  /var/log/nginx/error.log notice;
    pid        /var/run/nginx.pid;

    events {
        worker_connections  4096;
    }

    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;
        
        # Rate Limiting
        limit_req_zone $binary_remote_addr zone=api_limit:10m rate=500r/s;
        limit_req_status 429;

        log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$http_x_forwarded_for"';

        access_log  /var/log/nginx/access.log  main;

        sendfile        on;
        keepalive_timeout  65;

        upstream gateway-api {
            server uniz-gateway-api:3000;
        }

        server {
            listen       80;
            listen  [::]:80;
            server_name  localhost;

            # Dynamic CORS origin extraction
            set $cors_origin "";
            if ($http_origin ~* (https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$|https://uniz\.rguktong\.in$)) {
                set $cors_origin $http_origin;
            }

            # Global API Rate Limit with Burst
            location /api/v1 {
                limit_req zone=api_limit burst=1000 nodelay;

                if ($request_method = 'OPTIONS') {
                    add_header 'Access-Control-Allow-Origin' $cors_origin always;
                    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
                    add_header 'Access-Control-Allow-Headers' 'X-CSRF-Token, X-Requested-With, Accept, Accept-Version, Content-Length, Content-MD5, Content-Type, Date, X-Api-Version, Authorization' always;
                    add_header 'Access-Control-Allow-Credentials' 'true' always;
                    add_header 'Content-Length' 0;
                    add_header 'Content-Type' 'text/plain; charset=utf-8';
                    return 204;
                }

                proxy_pass http://gateway-api;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection 'upgrade';
                proxy_set_header Host $host;
                proxy_cache_bypass $http_upgrade;

                # Edge headers
                add_header 'Access-Control-Allow-Origin' $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
                add_header 'Access-Control-Allow-Headers' 'X-CSRF-Token, X-Requested-With, Accept, Accept-Version, Content-Length, Content-MD5, Content-Type, Date, X-Api-Version, Authorization' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;

                # Robust headers
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            location /db-admin/ {
                proxy_pass http://uniz-db-ui:8978/;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            location / {
                proxy_pass http://gateway-api;
            }
        }
    }
