apiVersion: apps/v1
kind: Deployment
metadata:
  name: uniz-portal
  labels:
    app: uniz-portal
spec:
  replicas: 15
  selector:
    matchLabels:
      app: uniz-portal
  template:
    metadata:
      labels:
        app: uniz-portal
    spec:
      containers:
        - name: portal
          image: uniz-portal:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: uniz-portal
spec:
  selector:
    app: uniz-portal
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: uniz-portal
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: uniz-portal
  minReplicas: 10
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
