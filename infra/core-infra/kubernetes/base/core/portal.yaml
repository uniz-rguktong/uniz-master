apiVersion: apps/v1
kind: Deployment
metadata:
  name: uniz-portal
  labels:
    app: uniz-portal
spec:
  replicas: 15
  selector:
    matchLabels:
      app: uniz-portal
  template:
    metadata:
      labels:
        app: uniz-portal
    spec:
      containers:
        - name: portal
          image: uniz-portal:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
---
apiVersion: v1
kind: Service
metadata:
  name: uniz-portal
spec:
  selector:
    app: uniz-portal
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: uniz-portal
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: uniz-portal
  minReplicas: 4
  maxReplicas: 40
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 4
          periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
