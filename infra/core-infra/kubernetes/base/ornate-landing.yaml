apiVersion: apps/v1
kind: Deployment
metadata:
  name: ornate-landing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ornate-landing
  template:
    metadata:
      labels:
        app: ornate-landing
    spec:
      containers:
        - name: ornate-landing
          image: docker.io/library/ornate-landing:local
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: uniz-config
            - configMapRef:
                name: ornate-landing-config
            - secretRef:
                name: ornate-landing-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: ornate-landing
spec:
  ports:
    - port: 80
      targetPort: 3000
  selector:
    app: ornate-landing
