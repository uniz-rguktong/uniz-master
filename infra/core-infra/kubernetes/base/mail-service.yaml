apiVersion: apps/v1
kind: Deployment
metadata:
  name: uniz-mail-service
  labels:
    app: uniz-mail-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uniz-mail-service
  template:
    metadata:
      labels:
        app: uniz-mail-service
    spec:
      containers:
        - name: mail-service
          image: desusreecharan/uniz-mail-service:latest
          ports:
            - containerPort: 3006
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: uniz-secrets
                  key: MAIL_DATABASE_URL
          envFrom:
            - configMapRef:
                name: uniz-config
            - secretRef:
                name: uniz-secrets
          resources:
            limits:
              cpu: "300m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: uniz-mail-service
spec:
  selector:
    app: uniz-mail-service
  ports:
    - protocol: TCP
      port: 3006
      targetPort: 3006
