name: VPS Automated Deployment

on:
  push:
    branches:
      - main
    paths-ignore:
      - "apps/ornate/**"
      - "apps/ornate-core/**"
  workflow_dispatch:
    inputs:
      commit_message:
        description: "Commit message for rebuilding (optional)"
        required: false
        default: "manual-update"

jobs:
  deploy:
    name: Build and Stream to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Inject Secrets and Deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          MASTER_VAULT: ${{ secrets.MASTER_VAULT }}
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          timeout: 60s
          envs: MASTER_VAULT
          script: |
            export DEPLOY_CONTEXT="GITHUB_ACTIONS"
            cd /root/uniz-master

            echo "[Security] Injecting Master Vault..."
            echo "$MASTER_VAULT" > /root/uniz-secrets.env
            chmod 600 /root/uniz-secrets.env

            echo "[CI/CD] Triggered by ${{ github.actor }} on commit ${{ github.sha }}"

            # Security: Verify repo integrity
            git fetch origin main
            git reset --hard origin/main

            # Extract commit message for build-detection
            COMMIT_MSG=$(git log -1 --pretty=%B)
            echo "[Log] Last Commit: $COMMIT_MSG"

            # Execute the heavy lifter
            /bin/bash ./scripts/deploy.sh "$COMMIT_MSG"
