on:
  push:
    branches:
      - main
    paths:
      - "apps/uniz-auth/**"
      - "apps/uniz-user/**"
      - "apps/uniz-outpass/**"
      - "apps/uniz-academics/**"
      - "apps/uniz-files/**"
      - "apps/uniz-mail/**"
      - "apps/uniz-notifications/**"
      - "apps/uniz-cron/**"
      - "apps/uniz-gateway/**"
      - "infra/core-infra/nginx/**"
      - "apps/uniz-portal/**"

permissions:
  contents: read
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            uniz-auth-service: 'apps/uniz-auth/**'
            uniz-user-service: 'apps/uniz-user/**'
            uniz-outpass-service: 'apps/uniz-outpass/**'
            uniz-academics-service: 'apps/uniz-academics/**'
            uniz-files-service: 'apps/uniz-files/**'
            uniz-mail-service: 'apps/uniz-mail/**'
            uniz-notification-service: 'apps/uniz-notifications/**'
            uniz-cron-service: 'apps/uniz-cron/**'
            uniz-gateway: 'infra/core-infra/nginx/**'
            uniz-gateway-api: 'apps/uniz-gateway/**'
            uniz-portal: 'apps/uniz-portal/**'

  build-and-push:
    needs: changes
    if: ${{ needs.changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service_key: ${{ fromJson(needs.changes.outputs.services) }}
        include:
          - service_key: uniz-auth-service
            context: apps/uniz-auth
            dockerfile: apps/uniz-auth/Dockerfile
          - service_key: uniz-user-service
            context: apps/uniz-user
            dockerfile: apps/uniz-user/Dockerfile
          - service_key: uniz-outpass-service
            context: apps/uniz-outpass
            dockerfile: apps/uniz-outpass/Dockerfile
          - service_key: uniz-academics-service
            context: apps/uniz-academics
            dockerfile: apps/uniz-academics/Dockerfile
          - service_key: uniz-files-service
            context: apps/uniz-files
            dockerfile: apps/uniz-files/Dockerfile
          - service_key: uniz-mail-service
            context: apps/uniz-mail
            dockerfile: apps/uniz-mail/Dockerfile
          - service_key: uniz-notification-service
            context: apps/uniz-notifications
            dockerfile: apps/uniz-notifications/Dockerfile
          - service_key: uniz-cron-service
            context: apps/uniz-cron
            dockerfile: apps/uniz-cron/Dockerfile
          - service_key: uniz-gateway
            context: infra/core-infra/nginx
            dockerfile: infra/core-infra/nginx/Dockerfile
          - service_key: uniz-gateway-api
            context: apps/uniz-gateway
            dockerfile: apps/uniz-gateway/Dockerfile
          - service_key: uniz-portal
            context: apps/uniz-portal
            dockerfile: apps/uniz-portal/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service_key }}
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/uniz-rguktong/${{ matrix.service_key }}:latest
          cache-from: type=gha,scope=${{ matrix.service_key }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service_key }}

  deploy:
    needs: [changes, build-and-push]
    if: ${{ needs.changes.outputs.services != '[]' && needs.changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VPS and Redeploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "${{ secrets.UNLOCK_PASSWORD }}" | /usr/local/bin/uniz-unlock
            cd ~/uniz-infrastructure
            # Check where the script actually is (legacy support)
            if [ -f "scripts/redeploy.sh" ]; then
              bash scripts/redeploy.sh
            elif [ -f "scripts/system/redeploy.sh" ]; then
              bash scripts/system/redeploy.sh
            else
              echo "Redeploy script not found!"
            fi
            /usr/local/bin/uniz-lock
