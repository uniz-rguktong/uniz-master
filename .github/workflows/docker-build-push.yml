on:
  push:
    branches:
      - main
    paths:
      - "uniz-auth/**"
      - "uniz-user/**"
      - "uniz-outpass/**"
      - "uniz-academics/**"
      - "uniz-files/**"
      - "uniz-mail/**"
      - "uniz-notifications/**"
      - "uniz-cron/**"
      - "uniz-gateway/**"
      - "uniz-infrastructure/nginx/**"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v3
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            uniz-auth-service: 'uniz-auth/**'
            uniz-user-service: 'uniz-user/**'
            uniz-outpass-service: 'uniz-outpass/**'
            uniz-academics-service: 'uniz-academics/**'
            uniz-files-service: 'uniz-files/**'
            uniz-mail-service: 'uniz-mail/**'
            uniz-notification-service: 'uniz-notifications/**'
            uniz-cron-service: 'uniz-cron/**'
            uniz-gateway: 'uniz-infrastructure/nginx/**'
            uniz-gateway-api: 'uniz-gateway/**'

  build-and-push:
    needs: changes
    if: ${{ needs.changes.outputs.services != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service_key: ${{ fromJson(needs.changes.outputs.services) }}
        include:
          - service_key: uniz-auth-service
            context: uniz-auth
            dockerfile: uniz-auth/Dockerfile
          - service_key: uniz-user-service
            context: uniz-user
            dockerfile: uniz-user/Dockerfile
          - service_key: uniz-outpass-service
            context: uniz-outpass
            dockerfile: uniz-outpass/Dockerfile
          - service_key: uniz-academics-service
            context: uniz-academics
            dockerfile: uniz-academics/Dockerfile
          - service_key: uniz-files-service
            context: uniz-files
            dockerfile: uniz-files/Dockerfile
          - service_key: uniz-mail-service
            context: uniz-mail
            dockerfile: uniz-mail/Dockerfile
          - service_key: uniz-notification-service
            context: uniz-notifications
            dockerfile: uniz-notifications/Dockerfile
          - service_key: uniz-cron-service
            context: uniz-cron
            dockerfile: uniz-cron/Dockerfile
          - service_key: uniz-gateway
            context: uniz-infrastructure/nginx
            dockerfile: uniz-infrastructure/nginx/Dockerfile
          - service_key: uniz-gateway-api
            context: uniz-gateway
            dockerfile: uniz-gateway/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service_key }}
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: desusreecharan/${{ matrix.service_key }}:latest
          cache-from: type=gha,scope=${{ matrix.service_key }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service_key }}

  deploy:
    needs: [changes, build-and-push]
    if: ${{ needs.changes.outputs.services != '[]' && needs.changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VPS and Redeploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/uniz-infrastructure
            bash scripts/redeploy.sh
